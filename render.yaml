services:
  # ── Frontend – Static Site (served from Vite build output) ──────────────────
  - type: static
    name: gatherup-frontend
    env: static
    # Render runs this from the repo root
    buildCommand: pnpm install --no-frozen-lockfile && pnpm -r --filter @workspace/gatherup run build
    staticPublishPath: artifacts/gatherup/dist/public

  # ── Backend – Node Web Service ───────────────────────────────────────────────
  - type: web
    name: api-server-backend
    env: node
    # Build the backend, then start it (no --env-file; Render injects env vars)
    buildCommand: pnpm install --no-frozen-lockfile && pnpm -r --filter @workspace/api-server run build
    startCommand: cd artifacts/api-server && node --enable-source-maps ./dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
    healthCheckPath: /health
