openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: GatherUp API - Community events platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: events
    description: Event operations
  - name: users
    description: User operations
  - name: categories
    description: Category operations
  - name: Storage
    description: Object storage endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: upcoming
          in: query
          schema:
            type: boolean
        - name: nearLat
          in: query
          schema:
            type: number
        - name: nearLng
          in: query
          schema:
            type: number
        - name: radiusKm
          in: query
          schema:
            type: number
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a new event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/featured:
    get:
      operationId: getFeaturedEvents
      tags: [events]
      summary: Get featured and trending events
      responses:
        "200":
          description: Featured events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

  /events/stats:
    get:
      operationId: getEventStats
      tags: [events]
      summary: Get event statistics by category
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventStats"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get a single event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Not found
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /events/{id}/join:
    post:
      operationId: joinEvent
      tags: [events]
      summary: Join an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceInput"
      responses:
        "201":
          description: Joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attendance"

  /events/{id}/leave:
    delete:
      operationId: leaveEvent
      tags: [events]
      summary: Leave an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceInput"
      responses:
        "204":
          description: Left event

  /events/{id}/attendees:
    get:
      operationId: getEventAttendees
      tags: [events]
      summary: Get attendees for an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of attendees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /auth/send-otp:
    post:
      operationId: sendOtp
      tags: [auth]
      summary: Send OTP to phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOtpInput"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpSendResult"

  /auth/verify-otp:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP and log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpInput"
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid or expired code

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current logged-in user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out current user
      responses:
        "200":
          description: Logged out

  /users:
    post:
      operationId: createUser
      tags: [users]
      summary: Create or register a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}/verify:
    post:
      operationId: verifyUser
      tags: [users]
      summary: Submit selfie for profile verification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyUserInput"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}/hosted:
    get:
      operationId: getUserHostedEvents
      tags: [users]
      summary: Events hosted by a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hosted events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

  /users/{id}/joined:
    get:
      operationId: getUserJoinedEvents
      tags: [users]
      summary: Events joined by a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Joined events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

  /events/{id}/comments:
    get:
      operationId: getEventComments
      tags: [events]
      summary: Get comments for an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createComment
      tags: [events]
      summary: Post a comment on an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /events/{id}/comments/{commentId}:
    delete:
      operationId: deleteComment
      tags: [events]
      summary: Delete a comment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List categories with event counts
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Event:
      type: object
      required: [id, title, description, category, location, date, time, hostId, attendeeCount, maxAttendees, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        location:
          type: string
        date:
          type: string
        time:
          type: string
        hostId:
          type: integer
        hostName:
          type: ["string", "null"]
        hostAvatar:
          type: ["string", "null"]
        attendeeCount:
          type: integer
        maxAttendees:
          type: integer
        imageUrl:
          type: ["string", "null"]
        latitude:
          type: ["number", "null"]
        longitude:
          type: ["number", "null"]
        distanceKm:
          type: ["number", "null"]
        createdAt:
          type: string

    EventInput:
      type: object
      required: [title, description, category, location, date, time, hostId, maxAttendees]
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        location:
          type: string
        date:
          type: string
        time:
          type: string
        hostId:
          type: integer
        maxAttendees:
          type: integer
        imageUrl:
          type: string
        latitude:
          type: number
        longitude:
          type: number

    EventUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        location:
          type: string
        date:
          type: string
        time:
          type: string
        maxAttendees:
          type: integer
        imageUrl:
          type: string

    EventStats:
      type: object
      required: [totalEvents, totalAttendees, categoryCounts]
      properties:
        totalEvents:
          type: integer
        totalAttendees:
          type: integer
        categoryCounts:
          type: array
          items:
            type: object
            required: [category, count]
            properties:
              category:
                type: string
              count:
                type: integer

    Attendance:
      type: object
      required: [id, eventId, userId, joinedAt]
      properties:
        id:
          type: integer
        eventId:
          type: integer
        userId:
          type: integer
        joinedAt:
          type: string

    AttendanceInput:
      type: object
      required: [userId]
      properties:
        userId:
          type: integer

    User:
      type: object
      required: [id, name, verified, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        profession:
          type: ["string", "null"]
        age:
          type: ["integer", "null"]
        city:
          type: ["string", "null"]
        interests:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        instagram:
          type: ["string", "null"]
        verified:
          type: boolean
        verifiedAt:
          type: ["string", "null"]
        verificationSelfieUrl:
          type: ["string", "null"]
        eventsHosted:
          type: ["integer", "null"]
        eventsJoined:
          type: ["integer", "null"]
        createdAt:
          type: string

    UserInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        bio:
          type: string
        avatarUrl:
          type: string

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        bio:
          type: string
        avatarUrl:
          type: string
        profession:
          type: string
        age:
          type: integer
        city:
          type: string
        interests:
          type: string
        phone:
          type: string
        website:
          type: string
        instagram:
          type: string

    VerifyUserInput:
      type: object
      required: [selfieObjectPath]
      properties:
        selfieObjectPath:
          type: string

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string

    Category:
      type: object
      required: [name, eventCount]
      properties:
        name:
          type: string
        icon:
          type: ["string", "null"]
        eventCount:
          type: integer

    Comment:
      type: object
      required: [id, eventId, userId, body, createdAt]
      properties:
        id:
          type: integer
        eventId:
          type: integer
        userId:
          type: integer
        userName:
          type: ["string", "null"]
        userAvatar:
          type: ["string", "null"]
        body:
          type: string
        createdAt:
          type: string

    CommentInput:
      type: object
      required: [userId, body]
      properties:
        userId:
          type: integer
        body:
          type: string

    SendOtpInput:
      type: object
      required: [phone]
      properties:
        phone:
          type: string

    OtpSendResult:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string
        devCode:
          type: ["string", "null"]

    VerifyOtpInput:
      type: object
      required: [phone, code]
      properties:
        phone:
          type: string
        code:
          type: string

    AuthResponse:
      type: object
      required: [success, user]
      properties:
        success:
          type: boolean
        user:
          $ref: "#/components/schemas/User"
