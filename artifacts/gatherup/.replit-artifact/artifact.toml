kind = "web"
previewPath = "/"
title = "GatherUp"
version = "1.0.0"
id = "artifacts/gatherup"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19443

[services.development]
run = "pnpm --filter @workspace/gatherup run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gatherup", "run", "build" ]
publicDir = "artifacts/gatherup/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19443"
BASE_PATH = "/"
